<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NÉXUS • DARK MOON</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
</head>
<body>
    <div class="header">
        <h1>🌀 NÉXUS • DARK MOON</h1>
        <div class="tabs">
            <button onclick="switchTab('game')">🌍 ИГРА</button>
            <button onclick="switchTab('lunadex')">📖 LUNADEx</button>
            <button onclick="switchTab('party')">👥 ПАРТИЯ</button>
        </div>
    </div>

    <!-- Overworld -->
    <div id="game-container" class="tab-content">
        <div id="overworld-container"></div>
        <div class="controls">
            <button onclick="moveDirection('up')">↑</button>
            <div class="horizontal">
                <button onclick="moveDirection('left')">←</button>
                <button onclick="moveDirection('down')">↓</button>
                <button onclick="moveDirection('right')">→</button>
            </div>
        </div>
    </div>

    <!-- Lunadex -->
    <div id="lunadex-container" class="tab-content" style="display: none;"></div>

    <!-- Партия (выбор покемонов) -->
    <div id="party-container" class="tab-content" style="display: none;">
        <h2>Твоя партия</h2>
        <div id="party-grid"></div>
    </div>

    <!-- Бой (скрытый до вызова) -->
    <div id="battle-container" class="tab-content" style="display: none;"></div>

    <script src="js/core/utils.js"></script>
    <script src="js/overworld.js"></script>
    <script src="js/battle.js"></script>
    <script src="js/lunadex.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
