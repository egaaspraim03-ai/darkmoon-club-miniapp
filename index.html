<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NÉXUS • DARK MOON</title>
  
  <!-- Telegram Mini App -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- Стили -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Phaser -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Навигация -->
    <div class="tab-bar">
      <button onclick="switchTab('overworld')" class="tab-btn active">🌍 Мир</button>
      <button onclick="switchTab('battle')" class="tab-btn">⚔️ Бой</button>
      <button onclick="switchTab('lunadex')" class="tab-btn">📖 Lunadex</button>
      <button onclick="switchTab('party')" class="tab-btn">👥 Команда</button>
      <button onclick="switchTab('inventory')" class="tab-btn">🎒 Инвентарь</button>
    </div>

    <!-- Контейнеры вкладок -->
    <div id="overworld-container" class="tab-content active"></div>
    <div id="battle-container" class="tab-content"></div>
    <div id="lunadex-container" class="tab-content"></div>
    <div id="party-container" class="tab-content"></div>
    <div id="inventory-container" class="tab-content"></div>
  </div>

  <!-- Все скрипты в правильном порядке -->
  <script src="js/core/constants.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/core/data-loader.js"></script>
  <script src="js/core/save-system.js"></script>

  <script src="js/main.js"></script>
  <script src="js/overworld.js"></script>
  <script src="js/battle.js"></script>
  <script src="js/lunadex.js"></script>
  <script src="js/party.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/ui.js"></script>

  <script>
    // Telegram WebApp готов
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  </script>
</body>
</html>
