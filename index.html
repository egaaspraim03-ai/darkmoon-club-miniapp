<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dark Moon Club</title>
  <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; margin:0; padding:0; background:#0a001f; color:#fff; }
    .container { max-width:420px; margin:0 auto; padding:16px 16px 130px 16px; }

    .header { background:linear-gradient(135deg,#2a0055,#0f001f); border-radius:24px; padding:28px 16px 24px; text-align:center; margin-bottom:20px; box-shadow:0 0 40px rgba(155,89,182,0.6); }
    .avatar { width:110px; height:110px; border-radius:50%; border:6px solid #9B59B6; box-shadow:0 0 35px #9B59B6, 0 0 65px rgba(155,89,182,0.8); margin-bottom:14px; }
    .header h1 { font-size:42px; font-weight:900; text-shadow:0 0 25px #9B59B6, 0 0 70px #C084FC; letter-spacing:3px; }

    .card { background:rgba(20,5,45,0.9); border:2px solid #9B59B6; border-radius:18px; padding:10px; margin-bottom:14px; box-shadow:0 0 25px rgba(155,89,182,0.4); }
    button { width:100%; padding:18px 16px; margin:8px 0; border:2px solid #9B59B6; border-radius:16px; font-size:18px; font-weight:700; background:linear-gradient(90deg,#6B1E9C,#9B59B6); color:white; box-shadow:0 0 20px rgba(155,89,182,0.6); transition:all .2s; }
    button:hover { transform:scale(1.04) translateY(-3px); box-shadow:0 0 40px #9B59B6; }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; max-width:420px; margin:0 auto; background:linear-gradient(90deg,#1a0033,#2a0055); border-top:3px solid #9B59B6; display:flex; padding:8px 0; box-shadow:0 -4px 20px rgba(155,89,182,0.5); z-index:1000; }
    .nav-item { flex:1; text-align:center; padding:8px; color:#bb99ff; font-size:14px; font-weight:600; }
    .nav-item.active { color:#fff; text-shadow:0 0 15px #C084FC; }
    .nav-item span { font-size:26px; display:block; margin-bottom:4px; }

    .screen { display:none; }
    .screen.active { display:block; }

    .battle-container { background:rgba(20,5,45,0.95); border:3px solid #9B59B6; border-radius:20px; padding:15px; margin-bottom:20px; max-height: calc(100vh - 280px); overflow-y:auto; }
    .pokemon-row { display:flex; justify-content:space-between; }
    .pokemon { text-align:center; width:48%; }
    .hp-bar { height:14px; background:#222; border-radius:10px; overflow:hidden; margin:8px 0; }
    .hp-fill { height:100%; background:linear-gradient(90deg,#00ff88,#00cc66); transition:width .4s; }
    .log { background:#0a001f; border:2px solid #9B59B6; border-radius:12px; padding:14px; min-height:110px; font-size:15px; margin:15px 0; line-height:1.4; }

    .moves-list { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
    .move-btn { background:rgba(155,89,182,0.3); border:2px solid #9B59B6; border-radius:12px; padding:14px; text-align:center; font-weight:600; }

    .effectiveness-table { display:grid; grid-template-columns: repeat(17, 38px); gap:3px; font-size:11px; overflow-x:auto; background:#1a0033; padding:8px; border-radius:12px; }
    .eff-header { background:#2a0055; color:#fff; padding:6px 4px; text-align:center; font-weight:700; font-size:10px; writing-mode:vertical-rl; height:110px; border-radius:4px; }
    .eff-cell { padding:8px 4px; text-align:center; border:1px solid #9B59B6; border-radius:4px; font-weight:600; }
    .eff-super { background:#00ff88 !important; color:#000; }
    .eff-neutral { background:#ddd !important; color:#000; }
    .eff-weak { background:#ff4444 !important; color:#000; }
    .eff-immune { background:#111 !important; color:#666; }

    .legend { display:flex; flex-wrap:wrap; gap:12px; margin-top:15px; font-size:14px; cursor:pointer; }
    .legend-item { display:flex; align-items:center; gap:8px; }

    .modal { position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,0.95); padding:20px; border-radius:20px 20px 0 0; display:none; z-index:2000; }
    .energy-bar { height:12px; background:#222; border-radius:10px; overflow:hidden; margin:8px 0; }
    .energy-fill { height:100%; background:linear-gradient(90deg,#C084FC,#9B59B6); }
  </style>
</head>
<body>
<div class="container">

  <!-- Клуб -->
  <div id="club-screen" class="screen active">
    <div class="header">
      <img src="https://i.ibb.co/HTR7J7Q5/nexus.jpg" class="avatar" alt="NEXUS">
      <h1>DARK MOON</h1>
      <div class="stats">103 участника • Уровень 6 • 23 место<br>Вместе в вечной тьме 🔥</div>
    </div>
    <div class="card">
      <button onclick="openLink('https://mangabuff.ru/clubs/dark-moon')">🔥 Мой клуб</button>
      <button onclick="openLink('https://mangabuff.ru/clubs/dark-moon/boost')">📈 Внести вклад / Вклады</button>
      <button onclick="openLink('https://mangabuff.ru/manga/test')">🃏 Клубные карты</button>
      <button onclick="openLink('https://mangabuff.ru/clubs')">🏆 Рейтинг клубов</button>
    </div>
    <div class="card">
      <button onclick="openLink('https://mangabuff.ru/')">📚 Новые главы</button>
      <button onclick="openLink('https://mangabuff.ru/manga')">📖 Каталог манги</button>
      <button onclick="openLink('https://t.me/mangabuff')">📰 Новости сайта (TG)</button>
    </div>
    <button onclick="openLink('https://mangabuff.ru/faq/general')" style="background:rgba(30,10,50,0.9);border-color:#7B4A9C;color:#ddd;">📋 FAQ по клубам и вкладам</button>
  </div>

  <!-- ИГРА (бой) -->
  <div id="game-screen" class="screen">
    <h2 style="text-align:center;color:#C084FC;margin:0 0 10px;">⚔️ БОЙ КАРТОЧЕК</h2>

    <div style="text-align:center;margin-bottom:12px;">
      <strong>Энергия: <span id="energy-text">10</span>/10</strong>
      <div class="energy-bar"><div class="energy-fill" id="energy-bar" style="width:100%"></div></div>
    </div>

    <!-- Кнопка выбора зоны прямо в бою -->
    <button onclick="chooseZoneBeforeBattle()" style="margin-bottom:15px;background:#6B1E9C;">
      🌍 Выбрать зону перед боем
    </button>

    <div class="battle-container">
      <div class="pokemon-row">
        <div class="pokemon">
          <div style="font-size:32px;">🧛</div>
          <strong id="player-name">DARK LORD</strong><br>
          <span style="color:#bb99ff;" id="player-info">Lv.12 • Лето • Трава</span>
          <div class="hp-bar"><div class="hp-fill" id="player-hp-bar" style="width:100%"></div></div>
          <small>HP <span id="player-hp-text">200/200</span></small>
        </div>
        <div class="pokemon">
          <div style="font-size:32px;">🐉</div>
          <strong id="enemy-name">SHADOW DRAGON</strong><br>
          <span style="color:#bb99ff;" id="enemy-info">Lv.11 • Осень • Дракон</span>
          <div class="hp-bar"><div class="hp-fill" id="enemy-hp-bar" style="width:100%"></div></div>
          <small>HP <span id="enemy-hp-text">200/200</span></small>
        </div>
      </div>

      <div class="log" id="battle-log">Что будет делать Dark Lord?</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <button onclick="chooseAction('attack')">⚔️ Атаковать</button>
        <button onclick="chooseAction('bag')">🎒 Рюкзак</button>
        <button onclick="chooseAction('switch')">🃏 Выбор героя</button>
        <button onclick="chooseAction('run')">🏃 Сбежать</button>
      </div>

      <div id="moves-panel" style="display:none;margin-top:15px;">
        <div class="moves-list" id="moves-list"></div>
      </div>
    </div>

    <!-- PvP блок -->
    <button onclick="openPvP()" style="margin-top:15px;background:linear-gradient(90deg,#C084FC,#9B59B6);">⚔️ PvP — Вызвать игроков</button>
  </div>

  <!-- Lunadex -->
  <div id="inventory-screen" class="screen">
    <h2 style="text-align:center;color:#C084FC;margin-bottom:20px;">🃏 Lunadex</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <button onclick="showInventorySection('pokedex')">📖 Lunadex</button>
      <button onclick="showInventorySection('items')">🎒 Предметы</button>
      <button onclick="showInventorySection('myheroes')">👤 Мои герои</button>
      <button onclick="showInventorySection('myitems')">📦 Мои предметы</button>
      <button onclick="showInventorySection('effectiveness')">📊 Таблица эффективности</button>
      <button onclick="showInventorySection('zones')">🌍 Зоны и Ивенты</button>
    </div>
    <div id="inventory-content" style="margin-top:20px;"></div>
  </div>

</div>

<!-- Нижняя панель -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab(0)"><span>🔥</span>Клуб</div>
  <div class="nav-item" onclick="switchTab(1)"><span>⚔️</span>Игра</div>
  <div class="nav-item" onclick="switchTab(2)"><span>🃏</span>Lunadex</div>
</div>

<!-- Модальное окно объяснения цветов -->
<div id="modal" class="modal">
  <div id="modal-content" style="background:#2a0055;border-radius:16px;padding:20px;color:#fff;"></div>
  <button onclick="closeModal()" style="margin-top:15px;width:100%;">Закрыть</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();

  function openLink(url) { tg.openLink(url); }

  let player = { name: "DARK LORD", level: 12, season: "Лето", element: "Трава", hp: 200, maxHp: 200, atk: 85, def: 70 };
  let enemy = { name: "SHADOW DRAGON", level: 11, season: "Осень", element: "Дракон", hp: 200, maxHp: 200, atk: 110, def: 65 };
  let energy = 10;
  let currentZone = "Лунный лес";

  const effectiveness = { /* полная таблица */ 
    "Трава": { "Огонь":0.5, "Вода":2, "Трава":0.5, "Ядовитый":0.5, "Насекомое":0.5, "Дракон":0.5 },
    "Огонь": { "Трава":2, "Вода":0.5, "Огонь":0.5, "Лед":2, "Дракон":0.5, "Стальной":2 },
    "Вода": { "Огонь":2, "Трава":0.5, "Вода":0.5, "Электрический":0.5 },
    "Электрический": { "Вода":2, "Трава":0.5, "Электрический":0.5, "Дракон":0.5 },
    "Лед": { "Трава":2, "Огонь":0.5, "Вода":0.5, "Лед":0.5, "Дракон":2 },
    "Боевой": { "Обычный":2, "Лед":2, "Тёмный":2, "Стальной":2, "Призрачный":0.5 },
    "Ядовитый": { "Трава":2, "Ядовитый":0.5, "Насекомое":2, "Призрачный":0.5 },
    "Земляной": { "Огонь":2, "Электрический":2, "Трава":0.5, "Ядовитый":2, "Летающий":0.5, "Стальной":2 },
    "Летающий": { "Трава":2, "Электрический":0.5, "Боевой":2, "Насекомое":2 },
    "Психический": { "Боевой":2, "Тёмный":0.5, "Призрачный":0.5 },
    "Насекомое": { "Трава":2, "Психический":2, "Тёмный":2 },
    "Каменный": { "Огонь":2, "Лед":2, "Летающий":2, "Боевой":2 },
    "Призрачный": { "Психический":2, "Призрачный":2, "Тёмный":0.5 },
    "Дракон": { "Дракон":2, "Тёмный":2 },
    "Тёмный": { "Психический":2, "Призрачный":2, "Тёмный":0.5 },
    "Стальной": { "Огонь":0.5, "Лед":2, "Призрачный":2, "Тёмный":2 }
  };

  const typeColors = {
    "Трава":"#78C850","Огонь":"#F08030","Вода":"#6890F0","Электрический":"#F8D030",
    "Лед":"#98D8D8","Боевой":"#C03028","Ядовитый":"#A040A0","Земляной":"#E0C068",
    "Летающий":"#A890F0","Психический":"#F85888","Насекомое":"#A8B820","Каменный":"#B8A038",
    "Призрачный":"#705898","Дракон":"#7038F8","Тёмный":"#705848","Стальной":"#B8B8D0"
  };

  function getMultiplier(attEl, defEl) {
    return effectiveness[attEl] && effectiveness[attEl][defEl] !== undefined ? effectiveness[attEl][defEl] : 1;
  }

  function calculateDamage(attacker, defender, movePower) {
    const mult = getMultiplier(attacker.element, defender.element);
    let dmg = Math.floor((((2 * attacker.level / 5 + 2) * attacker.atk * movePower / defender.def) / 50 + 2) * mult * (0.85 + Math.random() * 0.15));
    return Math.max(1, dmg);
  }

  function updateEnergy() {
    document.getElementById('energy-text').textContent = energy;
    document.getElementById('energy-bar').style.width = (energy / 10 * 100) + '%';
  }

  function updateHP() {
    document.getElementById('player-hp-bar').style.width = (player.hp / player.maxHp * 100) + '%';
    document.getElementById('player-hp-text').textContent = Math.max(0, Math.floor(player.hp)) + '/' + player.maxHp;
    document.getElementById('enemy-hp-bar').style.width = (enemy.hp / enemy.maxHp * 100) + '%';
    document.getElementById('enemy-hp-text').textContent = Math.max(0, Math.floor(enemy.hp)) + '/' + enemy.maxHp;
  }

  const moves = [
    { name: "Удар тенью", power: 55 },
    { name: "Ядовитый шип", power: 45 },
    { name: "Лунный луч", power: 70 },
    { name: "Тёмный вихрь", power: 60 }
  ];

  function chooseAction(action) {
    const log = document.getElementById('battle-log');
    const panel = document.getElementById('moves-panel');
    panel.style.display = 'none';

    if (energy <= 0) {
      log.innerHTML = '❌ Недостаточно энергии!';
      return;
    }

    if (action === 'attack') {
      panel.style.display = 'block';
      const list = document.getElementById('moves-list');
      list.innerHTML = '';
      moves.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'move-btn';
        btn.textContent = m.name;
        btn.onclick = () => playerAttack(m);
        list.appendChild(btn);
      });
    } else if (action === 'bag') log.innerHTML = 'Рюкзак пока пуст...';
    else if (action === 'switch') log.innerHTML = 'Выбор героя (скоро будет список из 6)';
    else if (action === 'run') {
      const chance = Math.random() * 100;
      log.innerHTML = chance > 35 ? '✅ Ты успешно сбежал!' : '❌ Побег не удался!';
    }
  }

  function playerAttack(move) {
    energy--;
    updateEnergy();
    const log = document.getElementById('battle-log');
    const dmg = calculateDamage(player, enemy, move.power);
    const mult = getMultiplier(player.element, enemy.element);

    enemy.hp -= dmg;
    let msg = `Ты использовал <strong>${move.name}</strong>!<br>Урон: <strong>${dmg}</strong> `;
    if (mult > 1) msg += 'Суперэффективно! 🔥';
    else if (mult < 1) msg += 'Не очень эффективно…';
    log.innerHTML = msg;

    updateHP();
    document.getElementById('moves-panel').style.display = 'none';

    if (enemy.hp <= 0) {
      log.innerHTML += '<br><br>🎉 <strong>ПОБЕДА!</strong>';
      return;
    }
    setTimeout(enemyTurn, 800);
  }

  function enemyTurn() {
    const log = document.getElementById('battle-log');
    const dmg = calculateDamage(enemy, player, 50);
    player.hp -= dmg;
    log.innerHTML = `Враг использовал Теневой удар!<br>Урон тебе: <strong>${dmg}</strong>`;
    updateHP();
    if (player.hp <= 0) log.innerHTML += '<br><br>💀 Твой герой пал в бою.<br>Восстанови энергию или воскреси героя.';
  }

  function openPvP() {
    if (energy <= 0) {
      document.getElementById('battle-log').innerHTML = '❌ Недостаточно энергии для PvP!';
      return;
    }
    energy--;
    updateEnergy();

    document.getElementById('battle-log').innerHTML = `
      🏆 <strong>Топ игроков онлайн:</strong><br>
      1. ShadowReaper (Lv.18) (ИИ)<br>
      2. MoonBlade (Lv.15) (ИИ)<br>
      3. DarkVortex (Lv.14) (ИИ)<br><br>
      👥 Сейчас онлайн: 47 игроков<br><br>
      <button onclick="openRadar()" style="background:#C084FC;color:#000;width:100%;">Открыть радар и выбрать цель</button>
    `;
  }

  function openRadar() {
    document.getElementById('battle-log').innerHTML = `
      📡 <strong>Радар</strong><br>
      • ShadowReaper (Lv.18, Тёмный) (ИИ) — рядом<br>
      • MoonBlade (Lv.15, Лед) (ИИ) — рядом<br>
      • IceWraith (Lv.12, Зима) (ИИ) — рядом<br><br>
      Нажми на цель, чтобы вызвать на бой:
      <button onclick="attackTarget('ShadowReaper')" style="margin-top:10px;">Вызвать ShadowReaper</button>
      <button onclick="attackTarget('MoonBlade')" style="margin-top:10px;">Вызвать MoonBlade</button>
    `;
  }

  function attackTarget(name) {
    document.getElementById('battle-log').innerHTML = `🔥 Ты вызвал на бой <strong>${name}</strong> (ИИ)! Бой начался...`;
  }

  function chooseZoneBeforeBattle() {
    showInventorySection('zones');
    switchTab(2);
  }

  function switchTab(n) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.screen')[n].classList.add('active');
    document.querySelectorAll('.nav-item')[n].classList.add('active');
  }

  function showInventorySection(section) {
    const content = document.getElementById('inventory-content');
    content.innerHTML = '';

    if (section === 'effectiveness') {
      const types = ["Трава","Огонь","Вода","Электрический","Лед","Боевой","Ядовитый","Земляной","Летающий","Психический","Насекомое","Каменный","Призрачный","Дракон","Тёмный","Стальной"];
      let html = `<h3>📊 Таблица эффективности</h3><div class="effectiveness-table">`;
      html += `<div class="eff-header"></div>`;
      types.forEach(t => html += `<div class="eff-header" style="background:${typeColors[t]};color:#000;">${t}</div>`);
      types.forEach(att => {
        html += `<div class="eff-header" style="background:${typeColors[att]};color:#000;">${att}</div>`;
        types.forEach(def => {
          const mult = getMultiplier(att, def);
          let cls = mult > 1 ? 'eff-super' : mult < 1 ? 'eff-weak' : 'eff-neutral';
          if (mult === 0) cls = 'eff-immune';
          html += `<div class="eff-cell ${cls}">${mult === 1 ? '○' : mult + '×'}</div>`;
        });
      });
      html += `</div>`;
      html += `
        <div class="legend">
          <div class="legend-item" onclick="showColorInfo(1)"><span style="color:#00ff88;font-size:20px;">🟢</span> Суперэффективно</div>
          <div class="legend-item" onclick="showColorInfo(2)"><span style="color:#ddd;font-size:20px;">⚪</span> Нейтрально</div>
          <div class="legend-item" onclick="showColorInfo(3)"><span style="color:#ff4444;font-size:20px;">🔴</span> Неэффективно</div>
          <div class="legend-item" onclick="showColorInfo(4)"><span style="color:#666;font-size:20px;">⚫</span> Иммунитет</div>
        </div>`;
      content.innerHTML = html;
    } 
    else if (section === 'zones') {
      content.innerHTML = `
        <h3>🌍 Выбор зоны</h3>
        <p><strong>Текущая зона:</strong> <span id="current-zone-display">${currentZone}</span></p>
        <button onclick="setZone('Лунный лес')" style="margin:6px 0;">🌲 Лунный лес (Лето)</button>
        <button onclick="setZone('Тёмные руины')" style="margin:6px 0;">🏚️ Тёмные руины (Осень)</button>
        <button onclick="setZone('Ледяные пики')" style="margin:6px 0;">❄️ Ледяные пики (Зима)</button>
        <button onclick="setZone('Каменные долины')" style="margin:6px 0;">🏔️ Каменные долины (Весна)</button>
        <p style="margin-top:15px;font-size:14px;">В выбранной зоне повышается шанс встретить героев этого сезона.</p>
      `;
    } 
    else {
      content.innerHTML = `<h3>${section === 'pokedex' ? 'Lunadex' : section === 'myheroes' ? 'Мои герои' : 'Предметы'}</h3><p>Скоро будет полный список.</p>`;
    }
  }

  function setZone(zone) {
    currentZone = zone;
    document.getElementById('current-zone-display').textContent = zone;
    document.getElementById('battle-log').innerHTML = `Зона изменена на <strong>${zone}</strong>.`;
    switchTab(1);
  }

  function showColorInfo(type) {
    const modal = document.getElementById('modal');
    const content = document.getElementById('modal-content');
    if (type === 1) content.innerHTML = `<h3>🟢 Суперэффективно</h3><p>Твой тип наносит в 2 раза больше урона этому противнику.</p>`;
    else if (type === 2) content.innerHTML = `<h3>⚪ Нейтрально</h3><p>Обычный урон. Ни преимущества, ни слабости.</p>`;
    else if (type === 3) content.innerHTML = `<h3>🔴 Неэффективно</h3><p>Твой тип наносит в 2 раза меньше урона.</p>`;
    else if (type === 4) content.innerHTML = `<h3>⚫ Иммунитет</h3><p>Атака этого типа не наносит никакого урона.</p>`;
    modal.style.display = 'block';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
  }

  window.onload = () => {
    switchTab(0);
    updateHP();
    updateEnergy();
  };
</script>
</body>
</html>
