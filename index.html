<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dark Moon Club</title>
  <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--tg-theme-bg-color);
      color: var(--tg-theme-text-color);
    }
    .container { max-width: 420px; margin: 0 auto; padding: 16px; }
    .header {
      text-align: center;
      padding: 24px 0 16px;
      background: linear-gradient(180deg, #4B0082, #1a0033);
      border-radius: 0 0 20px 20px;
      margin-bottom: 20px;
      color: white;
    }
    .header h1 {
      font-size: 32px;
      margin: 0;
      text-shadow: 0 0 15px rgba(147, 112, 219, 0.8);
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 8px;
      font-size: 15px;
      opacity: 0.95;
    }
    .card {
      background: var(--tg-theme-secondary-bg-color);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    }
    button {
      width: 100%;
      padding: 18px;
      margin: 8px 0;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      background: #9B59B6; /* фиолетовый как на сайте */
      color: white;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; transform: scale(1.03); }
    .secondary-btn {
      background: var(--tg-theme-secondary-bg-color);
      color: var(--tg-theme-text-color);
    }
    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Шапка в стиле клуба -->
    <div class="header">
      <h1>🌑 Dark Moon</h1>
      <div class="stats">
        <div>103 участника</div>
        <div>Уровень 6</div>
        <div>23 место</div>
      </div>
      <p style="margin-top:8px; font-size:15px; opacity:0.9;">Вместе в вечной тьме 🔥</p>
    </div>

    <!-- Основные кнопки клуба -->
    <div class="card">
      <button onclick="openLink('https://mangabuff.ru/clubs/dark-moon')">🔥 Мой клуб</button>
      <button onclick="openLink('https://mangabuff.ru/clubs/dark-moon/boost')">📈 Внести вклад / Вклады</button>
      <button onclick="openLink('https://mangabuff.ru/manga/test')">🃏 Клубные карты</button>
      <button onclick="openLink('https://mangabuff.ru/clubs')">🏆 Рейтинг клубов</button>
    </div>

    <!-- Чтение и новости -->
    <div class="card">
      <button onclick="openLink('https://mangabuff.ru/')">📚 Новые главы</button>
      <button onclick="openLink('https://mangabuff.ru/manga')">📖 Каталог манги</button>
      <button onclick="openLink('https://t.me/mangabuff')">📰 Новости сайта (официальный канал)</button>
    </div>

    <!-- Дополнительно -->
    <button onclick="openLink('https://mangabuff.ru/faq/general')" class="secondary-btn">
      📋 FAQ по клубам и вкладам
    </button>

    <div class="footer">
      Mini App для @DarkMoon_A_Bot • NEXUS style
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();                    // разворачивает на весь экран
    tg.MainButton.setText("Открыть клуб Dark Moon");
    tg.MainButton.onClick(() => openLink('https://mangabuff.ru/clubs/dark-moon'));
    tg.MainButton.show();

    function applyTheme() {
      // Автоматически подхватывает тёмную тему Telegram
      document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#1a0033');
      document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color);
      document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color);
    }
    applyTheme();
    tg.onEvent('themeChanged', applyTheme);

    function openLink(url) {
      tg.openLink(url);   // открывает внутри Telegram (без выхода из мини-аппа)
    }
  </script>
</body>
</html>
