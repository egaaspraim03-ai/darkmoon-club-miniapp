<!DOCTYPE html>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; margin:0; padding:0; background:#0a001f; color:#fff; }
    .container { max-width:480px; margin:0 auto; padding:16px 16px 130px; min-height:100vh; }

    .header { background:linear-gradient(135deg,#2a0055,#0f001f); border-radius:24px; padding:25px 20px; text-align:center; margin-bottom:20px; }
    .avatar { width:120px; height:120px; border-radius:50%; border:6px solid #9B59B6; box-shadow:0 0 40px #9B59B6; margin-bottom:12px; }
    .title { font-size:42px; font-weight:900; color:#C084FC; letter-spacing:3px; margin:0; }

    .big-button { 
      background:#6B1E9C; color:white; width:100%; padding:18px; margin:8px 0; 
      border-radius:16px; font-size:18px; font-weight:700; 
      box-shadow:0 4px 15px rgba(155,89,182,0.4); 
      display:flex; align-items:center; gap:12px;
    }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto; background:linear-gradient(90deg,#1a0033,#2a0055); border-top:3px solid #9B59B6; display:flex; padding:8px 0; z-index:1000; }
    .nav-item { flex:1; text-align:center; color:#bb99ff; font-weight:600; }
    .nav-item.active { color:#fff; text-shadow:0 0 15px #C084FC; }
    .nav-item span { font-size:28px; display:block; margin-bottom:2px; }

    .screen { display:none; }
    .screen.active { display:block; }

    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; z-index:3000; align-items:center; justify-content:center; padding:20px; }
    .modal-content { background:#1a0033; border-radius:20px; padding:20px; width:100%; max-width:440px; max-height:92vh; overflow-y:auto; box-shadow:0 0 40px #C084FC; }
  </style>
</head>
<body>
<div class="container">

  <!-- ==================== КЛУБ ==================== -->
  <div id="club-screen" class="screen active">
    <div class="header">
      <img src="https://i.ibb.co/HTR7J7Q5/nexus.jpg" class="avatar">
      <h1 class="title">DARK MOON</h1>
      <p class="subtitle">Клуб Тьмы</p>
      <div class="stats">103 участника • Уровень 6 • 23 место<br>Вместе в вечной тьме 🔥</div>
    </div>

    <div class="big-button" onclick="openLink('https://mangabuff.ru/clubs/dark-moon')"><span>🔥</span> Мой клуб</div>
    <div class="big-button" onclick="openLink('https://mangabuff.ru/clubs/dark-moon/boost')"><span>📈</span> Внести вклад / Вклады</div>
    <div class="big-button" onclick="openLink('https://mangabuff.ru/manga/test')"><span>🃏</span> Клубные карты</div>
    <div class="big-button" onclick="openLink('https://mangabuff.ru/clubs')"><span>🏆</span> Рейтинг клубов</div>

    <div class="big-button"><span>📖</span> Новые главы</div>
    <div class="big-button"><span>📚</span> Каталог манги</div>

    <!-- Новости сайта -->
    <div class="big-button" onclick="openLink('https://t.me/mangabuff')"><span>📰</span> Официальные новости</div>
    <div class="big-button" onclick="openLink('https://t.me/modermangabuff')"><span>👥</span> Чатик модераторов</div>
    <div class="big-button" onclick="openLink('https://t.me/podmbff')"><span>👂</span> Подслушано на mangabuff</div>
  </div>

  <!-- ИГРА, LUNADEx и остальное — без изменений (как в предыдущей версии) -->
  <!-- ... (весь остальной код index.html остаётся прежним) ... -->

</div>

<!-- Нижняя панель и модалка (без изменений) -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab(0)"><span>🔥</span>Клуб</div>
  <div class="nav-item" onclick="switchTab(1)"><span>⚔️</span>Игра</div>
  <div class="nav-item" onclick="switchTab(2)"><span>📦</span>Архив Тьмы</div>
</div>

<div id="modal" class="modal"><div class="modal-content" id="modal-content"></div></div>
