<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dark Moon Club</title>
  <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
  <script src="pokedex-data.js"></script> <!-- ← здесь должен быть ТВОЙ файл -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; margin:0; padding:0; background:#0a001f; color:#fff; }
    .container { max-width:420px; margin:0 auto; padding:16px 16px 130px 16px; }

    .header { background:linear-gradient(135deg,#2a0055,#0f001f); border-radius:24px; padding:28px 16px 24px; text-align:center; margin-bottom:20px; box-shadow:0 0 40px rgba(155,89,182,0.6); }
    .avatar { width:110px; height:110px; border-radius:50%; border:6px solid #9B59B6; box-shadow:0 0 35px #9B59B6, 0 0 65px rgba(155,89,182,0.8); margin-bottom:14px; }
    .header h1 { font-size:42px; font-weight:900; text-shadow:0 0 25px #9B59B6, 0 0 70px #C084FC; letter-spacing:3px; }

    button { width:100%; padding:18px 16px; margin:8px 0; border:2px solid #9B59B6; border-radius:16px; font-size:18px; font-weight:700; color:white; box-shadow:0 0 20px rgba(155,89,182,0.6); transition:all .2s; }
    button:hover { transform:scale(1.04) translateY(-3px); box-shadow:0 0 40px #9B59B6; }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; max-width:420px; margin:0 auto; background:linear-gradient(90deg,#1a0033,#2a0055); border-top:3px solid #9B59B6; display:flex; padding:8px 0; box-shadow:0 -4px 20px rgba(155,89,182,0.5); z-index:1000; }
    .nav-item { flex:1; text-align:center; padding:8px; color:#bb99ff; font-size:14px; font-weight:600; }
    .nav-item.active { color:#fff; text-shadow:0 0 15px #C084FC; }
    .nav-item span { font-size:26px; display:block; margin-bottom:4px; }

    .screen { display:none; }
    .screen.active { display:block; }

    .pokedex-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:14px; margin-top:15px; }
    .pokedex-card { background:rgba(20,5,45,0.95); border:3px solid #9B59B6; border-radius:18px; padding:12px; text-align:center; cursor:pointer; transition:all .2s; }
    .pokedex-card:hover { transform:scale(1.08); box-shadow:0 0 30px #C084FC; }
    .pokedex-card img { width:90px; height:90px; image-rendering:pixelated; }

    .modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); display:none; z-index:3000; padding:20px; align-items:center; justify-content:center; }
    .modal-content { background:#2a0055; border-radius:20px; padding:25px; width:100%; max-width:380px; text-align:center; max-height:90vh; overflow-y:auto; }
  </style>
</head>
<body>
<div class="container">

  <!-- Клуб (вкладка 1) -->
  <div id="club-screen" class="screen active">
    <div class="header">
      <img src="https://i.ibb.co/HTR7J7Q5/nexus.jpg" class="avatar" alt="NEXUS">
      <h1>DARK MOON</h1>
    </div>
    <button onclick="openLink('https://mangabuff.ru/clubs/dark-moon')">🔥 Мой клуб</button>
    <button onclick="openLink('https://mangabuff.ru/clubs/dark-moon/boost')">📈 Внести вклад</button>
    <button onclick="openLink('https://mangabuff.ru/manga/test')">🃏 Клубные карты</button>
    <button onclick="openLink('https://mangabuff.ru/clubs')">🏆 Рейтинг клубов</button>
  </div>

  <!-- Игра (вкладка 2) -->
  <div id="game-screen" class="screen">
    <h2 style="text-align:center;color:#C084FC;margin:15px 0;">🌌 Приключение Тьмы</h2>
    <div id="adventure-screen">
      <div class="battle-container" style="background:rgba(20,5,45,0.95);border:3px solid #9B59B6;border-radius:20px;padding:15px;">
        <div id="battle-area">
          <div class="log" id="battle-log" style="min-height:140px;">Выбери регион и ищи героев из других миров!</div>
          <button onclick="showRegionSelection()" style="margin-top:10px;background:#6B1E9C;">🌍 Выбрать регион</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Lunadex (вкладка 3) -->
  <div id="inventory-screen" class="screen">
    <h2 style="text-align:center;color:#C084FC;margin-bottom:20px;">🃏 Lunadex — Герои миров</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <button onclick="showLunadexSection('pokemons')">🌐 Все герои</button>
      <button onclick="showLunadexSection('myheroes')">👤 Мои герои</button>
      <button onclick="showLunadexSection('worlds')">🌍 Миры</button>
    </div>
    <div id="lunadex-content" style="margin-top:20px;"></div>
  </div>

</div>

<!-- Нижняя панель -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab(0)"><span>🔥</span>Клуб</div>
  <div class="nav-item" onclick="switchTab(1)"><span>⚔️</span>Игра</div>
  <div class="nav-item" onclick="switchTab(2)"><span>🃏</span>Lunadex</div>
</div>

<!-- Модалка карточки героя -->
<div id="pokemon-detail-modal" class="modal">
  <div class="modal-content" id="pokemon-detail-content"></div>
</div>

<script>
// ==================== ДАННЫЕ ГЕРОЕВ ====================
let myHeroes = []; // сюда будут попадать пойманные герои

// ==================== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ====================
function switchTab(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.querySelectorAll('.screen')[n].classList.add('active');
  document.querySelectorAll('.nav-item')[n].classList.add('active');
}

// ==================== Lunadex ====================
function showLunadexSection(section) {
  const content = document.getElementById('lunadex-content');
  
  if (section === 'pokemons') {
    content.innerHTML = `
      <h3>🌐 Все герои из разных миров</h3>
      <input id="search" type="text" placeholder="Поиск по имени..." style="width:100%;padding:12px;border-radius:12px;border:2px solid #9B59B6;background:#1a0033;color:#fff;margin:10px 0;" onkeyup="filterHeroes()">
      <div class="pokedex-grid" id="heroes-grid"></div>`;
    renderHeroesGrid(pokedexData);
  } 
  else if (section === 'myheroes') {
    content.innerHTML = `<h3>👤 Мои герои (${myHeroes.length})</h3><div class="pokedex-grid" id="myheroes-grid"></div>`;
    renderHeroesGrid(myHeroes, true);
  } 
  else if (section === 'worlds') {
    content.innerHTML = `<h3>🌍 Миры</h3><p>Лунный Кант • Теневой Джото • Холодный Хоэнн • Каменный Палдеа<br>(скоро можно будет фильтровать героев по миру)</p>`;
  }
}

function renderHeroesGrid(data, isMy = false) {
  const grid = document.getElementById(isMy ? 'myheroes-grid' : 'heroes-grid');
  grid.innerHTML = '';
  data.forEach(h => {
    const card = document.createElement('div');
    card.className = 'pokedex-card';
    card.innerHTML = `<img src="${h.sprite}" alt="${h.ru}"><strong>#${h.num}</strong><br><span>${h.ru}</span>`;
    card.onclick = () => showHeroDetail(h);
    grid.appendChild(card);
  });
  if (data.length === 0) grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;">Пока ни одного героя не поймано...</p>';
}

function filterHeroes() {
  const term = document.getElementById('search').value.toLowerCase();
  const filtered = pokedexData.filter(h => h.ru.toLowerCase().includes(term) || h.num.includes(term));
  renderHeroesGrid(filtered);
}

function showHeroDetail(h) {
  const modal = document.getElementById('pokemon-detail-modal');
  const content = document.getElementById('pokemon-detail-content');
  content.innerHTML = `
    <img src="${h.sprite}" style="width:140px;height:140px;margin:10px auto;display:block;">
    <h2>#${h.num} ${h.ru}</h2>
    <p style="color:#C084FC">${h.en}</p>
    <button onclick="catchHero('${h.num}')" style="margin:15px 0;background:#00cc66;width:100%;">🔥 Поймать героя</button>
    <button onclick="closeModal()" style="width:100%;">Закрыть</button>`;
  modal.style.display = 'flex';
}

function catchHero(num) {
  const hero = pokedexData.find(h => h.num === num);
  if (hero && !myHeroes.find(h => h.num === num)) {
    myHeroes.push(hero);
    alert(`✅ ${hero.ru} пойман и добавлен в Lunadex!`);
  }
  closeModal();
}

function closeModal() {
  document.getElementById('pokemon-detail-modal').style.display = 'none';
}

// ==================== Игра (простая) ====================
function showRegionSelection() {
  const log = document.getElementById('battle-log');
  log.innerHTML = `
    <strong>Выбери мир:</strong><br><br>
    <button onclick="startEncounter('Лунный Кант')" style="margin:6px 0;width:100%;">🌕 Лунный Кант</button>
    <button onclick="startEncounter('Теневой Джото')" style="margin:6px 0;width:100%;">🌑 Теневой Джото</button>
    <button onclick="startEncounter('Холодный Хоэнн')" style="margin:6px 0;width:100%;">❄️ Холодный Хоэнн</button>
    <button onclick="startEncounter('Каменный Палдеа')" style="margin:6px 0;width:100%;">🏔️ Каменный Палдеа</button>`;
}

function startEncounter(world) {
  const log = document.getElementById('battle-log');
  const randomHero = pokedexData[Math.floor(Math.random() * pokedexData.length)];
  log.innerHTML = `В мире <strong>${world}</strong> появился герой!<br><br>
    <strong>${randomHero.ru}</strong><br>
    <button onclick="catchHero('${randomHero.num}')" style="background:#00cc66;margin-top:10px;width:100%;">🔥 Поймать</button>
    <button onclick="fightHero()" style="margin-top:8px;width:100%;">⚔️ Сразиться</button>`;
}

function fightHero() {
  document.getElementById('battle-log').innerHTML = 'Бой в разработке (можно добавить позже). Пока что просто лови героев!';
}

// ==================== Вспомогательные функции ====================
function openLink(url) { Telegram.WebApp.openLink(url); }

window.onload = () => {
  switchTab(0); // стартуем на вкладке Клуб
  console.log("✅ Dark Moon Web App загружен. Покемонов/героев:", pokedexData ? pokedexData.length : 0);
};
</script>
</body>
</html>
