<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dark Moon Club</title>
  <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; margin:0; padding:0; background:#0a001f; color:#fff; }
    .container { max-width:420px; margin:0 auto; padding:16px 16px 130px 16px; }

    .header { background:linear-gradient(135deg,#2a0055,#0f001f); border-radius:24px; padding:28px 16px 24px; text-align:center; margin-bottom:20px; box-shadow:0 0 40px rgba(155,89,182,0.6); }
    .avatar { width:110px; height:110px; border-radius:50%; border:6px solid #9B59B6; box-shadow:0 0 35px #9B59B6, 0 0 65px rgba(155,89,182,0.8); margin-bottom:14px; }
    .header h1 { font-size:42px; font-weight:900; text-shadow:0 0 25px #9B59B6, 0 0 70px #C084FC; letter-spacing:3px; }

    button { width:100%; padding:18px 16px; margin:8px 0; border:2px solid #9B59B6; border-radius:16px; font-size:18px; font-weight:700; background:linear-gradient(90deg,#6B1E9C,#9B59B6); color:white; box-shadow:0 0 20px rgba(155,89,182,0.6); transition:all .2s; }
    button:hover { transform:scale(1.04) translateY(-3px); box-shadow:0 0 40px #9B59B6; }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; max-width:420px; margin:0 auto; background:linear-gradient(90deg,#1a0033,#2a0055); border-top:3px solid #9B59B6; display:flex; padding:8px 0; box-shadow:0 -4px 20px rgba(155,89,182,0.5); z-index:1000; }
    .nav-item { flex:1; text-align:center; padding:8px; color:#bb99ff; font-size:14px; font-weight:600; }
    .nav-item.active { color:#fff; text-shadow:0 0 15px #C084FC; }
    .nav-item span { font-size:26px; display:block; margin-bottom:4px; }

    .screen { display:none; }
    .screen.active { display:block; }

    .battle-container { background:rgba(20,5,45,0.95); border:3px solid #9B59B6; border-radius:20px; padding:15px; margin-bottom:20px; }
    .pokemon-row { display:flex; justify-content:space-between; }
    .pokemon { text-align:center; width:48%; }
    .hp-bar { height:14px; background:#222; border-radius:10px; overflow:hidden; margin:8px 0; }
    .hp-fill { height:100%; background:linear-gradient(90deg,#00ff88,#00cc66); transition:width .4s; }
    .log { background:#0a001f; border:2px solid #9B59B6; border-radius:12px; padding:14px; min-height:110px; font-size:15px; margin:15px 0; line-height:1.4; }

    .modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); display:none; z-index:3000; padding:20px; align-items:center; justify-content:center; }
    .modal-content { background:#2a0055; border-radius:20px; padding:25px; width:100%; max-width:380px; text-align:center; }
  </style>
</head>
<body>
<div class="container">

  <!-- Клуб -->
  <div id="club-screen" class="screen active">
    <div class="header">
      <img src="https://i.ibb.co/HTR7J7Q5/nexus.jpg" class="avatar" alt="NEXUS">
      <h1>DARK MOON</h1>
      <div class="stats">103 участника • Уровень 6 • 23 место<br>Вместе в вечной тьме 🔥</div>
    </div>
    <div class="card">
      <button onclick="openLink('https://mangabuff.ru/clubs/dark-moon')">🔥 Мой клуб</button>
      <button onclick="openLink('https://mangabuff.ru/clubs/dark-moon/boost')">📈 Внести вклад / Вклады</button>
      <button onclick="openLink('https://mangabuff.ru/manga/test')">🃏 Клубные карты</button>
      <button onclick="openLink('https://mangabuff.ru/clubs')">🏆 Рейтинг клубов</button>
    </div>
    <div class="card">
      <button onclick="openLink('https://mangabuff.ru/')">📚 Новые главы</button>
      <button onclick="openLink('https://mangabuff.ru/manga')">📖 Каталог манги</button>
      <button onclick="openLink('https://t.me/mangabuff')">📰 Новости сайта (TG)</button>
    </div>
  </div>

  <!-- ИГРА -->
  <div id="game-screen" class="screen">
    <h2 style="text-align:center;color:#C084FC;margin:0 0 15px;">⚔️ БОЙ КАРТОЧЕК</h2>

    <div style="text-align:center;margin-bottom:12px;">
      <strong>Энергия: <span id="energy-text">10</span>/10</strong>
      <div class="energy-bar"><div class="energy-fill" id="energy-bar" style="width:100%"></div></div>
    </div>

    <button onclick="showZoneSelection()" style="margin-bottom:15px;background:#6B1E9C;">
      🌍 Выбрать зону перед боем
    </button>

    <div id="battle-area" style="display:none;">
      <div class="battle-container">
        <div class="pokemon-row">
          <div class="pokemon">
            <div style="font-size:32px;" id="player-emoji">🧛</div>
            <strong id="player-name">DARK LORD</strong><br>
            <span style="color:#bb99ff;" id="player-info">Lv.12 • Лето • Трава</span>
            <div class="hp-bar"><div class="hp-fill" id="player-hp-bar" style="width:100%"></div></div>
            <small>HP <span id="player-hp-text">200/200</span></small>
          </div>
          <div class="pokemon">
            <div style="font-size:32px;" id="enemy-emoji">🐉</div>
            <strong id="enemy-name">SHADOW DRAGON</strong><br>
            <span style="color:#bb99ff;" id="enemy-info">Lv.11 • Осень • Дракон</span>
            <div class="hp-bar"><div class="hp-fill" id="enemy-hp-bar" style="width:100%"></div></div>
            <small>HP <span id="enemy-hp-text">200/200</span></small>
          </div>
        </div>

        <div class="log" id="battle-log">Что будет делать Dark Lord?</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <button onclick="playerAttack()">⚔️ Атаковать</button>
          <button onclick="usePotion()">🧪 Зелье (10)</button>
          <button onclick="chooseAction('switch')">🃏 Выбор героя</button>
          <button onclick="tryEscape()">🏃 Сбежать</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Lunadex -->
  <div id="inventory-screen" class="screen">
    <h2 style="text-align:center;color:#C084FC;margin-bottom:20px;">🃏 Lunadex</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <button onclick="showLunadexSection('pokedex')">📖 Lunadex</button>
      <button onclick="showLunadexSection('items')">🎒 Предметы</button>
      <button onclick="showLunadexSection('myheroes')">👤 Мои герои</button>
      <button onclick="showLunadexSection('myitems')">📦 Мои предметы</button>
      <button onclick="showLunadexSection('effectiveness')">📊 Таблица эффективности</button>
      <button onclick="showLunadexSection('events')">🎉 Ивенты</button>
    </div>
    <div id="lunadex-content" style="margin-top:20px;"></div>
  </div>

</div>

<!-- Нижняя панель -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab(0)"><span>🔥</span>Клуб</div>
  <div class="nav-item" onclick="switchTab(1)"><span>⚔️</span>Игра</div>
  <div class="nav-item" onclick="switchTab(2)"><span>🃏</span>Lunadex</div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();

  let energy = 10;
  let trainerNick = "Тренер";
  let playerHp = 200;
  let enemyHp = 200;
  let potionCount = 10;

  function updateEnergy() {
    document.getElementById('energy-text').textContent = energy;
    document.getElementById('energy-bar').style.width = (energy / 10 * 100) + '%';
  }

  function updateHP() {
    document.getElementById('player-hp-bar').style.width = (playerHp / 200 * 100) + '%';
    document.getElementById('player-hp-text').textContent = playerHp + '/200';
    document.getElementById('enemy-hp-bar').style.width = (enemyHp / 200 * 100) + '%';
    document.getElementById('enemy-hp-text').textContent = enemyHp + '/200';
  }

  function showZoneSelection() {
    document.getElementById('battle-area').style.display = 'block';
    const log = document.getElementById('battle-log');
    log.innerHTML = `
      <strong>Выбери зону:</strong><br><br>
      <button onclick="selectZone('Лунный лес (Лето)')" style="margin:6px 0;width:100%;">🌲 Лунный лес (Лето)</button>
      <button onclick="selectZone('Тёмные руины (Осень)')" style="margin:6px 0;width:100%;">🏚️ Тёмные руины (Осень)</button>
      <button onclick="selectZone('Ледяные пики (Зима)')" style="margin:6px 0;width:100%;">❄️ Ледяные пики (Зима)</button>
      <button onclick="selectZone('Каменные долины (Весна)')" style="margin:6px 0;width:100%;">🏔️ Каменные долины (Весна)</button>
    `;
  }

  function selectZone(zone) {
    document.getElementById('battle-log').innerHTML = `
      Ты прибыл в <strong>${zone}</strong>.<br><br>
      <button onclick="startEncounter()" style="background:#C084FC;color:#000;width:100%;">🔍 Искать противника</button>
    `;
  }

  function startEncounter() {
    playerHp = 200;
    enemyHp = 200;
    potionCount = 10;
    updateHP();
    document.getElementById('battle-log').innerHTML = `Дикий герой появился!<br><br>Что будешь делать?`;
  }

  function playerAttack() {
    const damage = Math.floor(Math.random() * 25) + 15;
    enemyHp = Math.max(0, enemyHp - damage);
    document.getElementById('battle-log').innerHTML = `Ты нанёс ${damage} урона!`;
    updateHP();
    if (enemyHp <= 0) {
      document.getElementById('battle-log').innerHTML += '<br><br>🎉 Ты победил!';
      return;
    }
    setTimeout(enemyTurn, 700);
  }

  function enemyTurn() {
    const damage = Math.floor(Math.random() * 22) + 10;
    playerHp = Math.max(0, playerHp - damage);
    document.getElementById('battle-log').innerHTML = `Враг нанёс тебе ${damage} урона!`;
    updateHP();
    if (playerHp <= 0) document.getElementById('battle-log').innerHTML += '<br><br>💀 Ты проиграл...';
  }

  function usePotion() {
    if (potionCount <= 0) {
      document.getElementById('battle-log').innerHTML = 'Зелий больше нет!';
      return;
    }
    potionCount--;
    playerHp = Math.min(200, playerHp + 60);
    document.getElementById('battle-log').innerHTML = `Ты использовал зелье! (+60 HP)`;
    updateHP();
  }

  function tryEscape() {
    const chance = Math.random() * 100;
    if (chance > 45) {
      document.getElementById('battle-log').innerHTML = '✅ Ты успешно сбежал!';
      document.getElementById('battle-area').style.display = 'none';
    } else {
      document.getElementById('battle-log').innerHTML = '❌ Не удалось сбежать!';
      setTimeout(enemyTurn, 600);
    }
  }

  function chooseAction(action) {
    if (action === 'switch') document.getElementById('battle-log').innerHTML = 'Выбор героя (скоро)';
  }

  function switchTab(n) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.screen')[n].classList.add('active');
    document.querySelectorAll('.nav-item')[n].classList.add('active');
  }

  function showLunadexSection(section) {
    const content = document.getElementById('lunadex-content');
    if (section === 'effectiveness') {
      content.innerHTML = `
        <h3>📊 Таблица эффективности</h3>
        <p>Скоро здесь будет полная таблица стихий (как мы делали раньше).</p>
      `;
    } else {
      content.innerHTML = `<h3>${section}</h3><p>Раздел в разработке.</p>`;
    }
  }

  function openLink(url) { tg.openLink(url); }

  window.onload = () => {
    switchTab(0);
  };
</script>
</body>
</html>
