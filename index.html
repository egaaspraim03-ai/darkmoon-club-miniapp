<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dark Moon Club</title>
  <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; margin:0; padding:0; background:#0a001f; color:#fff; }
    .container { max-width:420px; margin:0 auto; padding:16px; }

    .header { background:linear-gradient(135deg,#2a0055,#0f001f); border-radius:24px; padding:28px 16px 24px; text-align:center; margin-bottom:20px; box-shadow:0 0 40px rgba(155,89,182,0.6); position:relative; overflow:hidden; }
    .header::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle,rgba(155,89,182,0.2)0%,transparent 70%); animation:pulse 8s infinite; }
    .avatar { width:110px; height:110px; border-radius:50%; border:6px solid #9B59B6; box-shadow:0 0 35px #9B59B6, 0 0 65px rgba(155,89,182,0.8); margin-bottom:14px; object-fit:cover; }
    .header h1 { font-size:42px; font-weight:900; margin:8px 0 10px; text-shadow:0 0 25px #9B59B6, 0 0 45px #9B59B6, 0 0 70px #C084FC; letter-spacing:3px; }
    .stats { color:#bb99ff; font-size:16px; text-shadow:0 0 12px #9B59B6; }

    .card { background:rgba(20,5,45,0.9); border:2px solid #9B59B6; border-radius:18px; padding:10px; margin-bottom:14px; box-shadow:0 0 25px rgba(155,89,182,0.4); }

    button { width:100%; padding:18px 16px; margin:8px 0; border:2px solid #9B59B6; border-radius:16px; font-size:18px; font-weight:700; background:linear-gradient(90deg,#6B1E9C,#9B59B6); color:white; display:flex; align-items:center; gap:14px; box-shadow:0 0 20px rgba(155,89,182,0.6); transition:all .2s; }
    button:hover { transform:scale(1.04) translateY(-3px); box-shadow:0 0 40px #9B59B6; }

    /* Нижняя панель */
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; max-width:420px; margin:0 auto; background:linear-gradient(90deg,#1a0033,#2a0055); border-top:3px solid #9B59B6; display:flex; padding:8px 0; box-shadow:0 -4px 20px rgba(155,89,182,0.5); z-index:1000; }
    .nav-item { flex:1; text-align:center; padding:8px; color:#bb99ff; font-size:14px; font-weight:600; transition:all .3s; }
    .nav-item.active { color:#fff; text-shadow:0 0 15px #C084FC; }
    .nav-item span { font-size:26px; display:block; margin-bottom:4px; }

    .screen { display:none; }
    .screen.active { display:block; }

    /* Бой */
    .battle-container { background:rgba(20,5,45,0.95); border:3px solid #9B59B6; border-radius:20px; padding:15px; margin-bottom:20px; }
    .pokemon-row { display:flex; justify-content:space-between; }
    .pokemon { text-align:center; width:48%; }
    .hp-bar { height:14px; background:#222; border-radius:10px; overflow:hidden; margin:8px 0; }
    .hp-fill { height:100%; background:linear-gradient(90deg,#00ff88,#00cc66); transition:width .4s; }
    .log { background:#0a001f; border:2px solid #9B59B6; border-radius:12px; padding:14px; min-height:90px; font-size:15px; margin:15px 0; }

    .moves-list { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
    .move-btn { background:rgba(155,89,182,0.3); border:2px solid #9B59B6; border-radius:12px; padding:12px; text-align:center; font-weight:600; }

    /* Карточки */
    .inventory-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .stat { display:flex; justify-content:space-between; margin:4px 0; font-size:15px; }
  </style>
</head>
<body>
<div class="container">

  <!-- Клуб -->
  <div id="club-screen" class="screen active">
    <div class="header">
      <img src="https://i.ibb.co/HTR7J7Q5/nexus.jpg" class="avatar" alt="NEXUS">
      <h1>DARK MOON</h1>
      <div class="stats">103 участника • Уровень 6 • 23 место<br>Вместе в вечной тьме 🔥</div>
    </div>
    <div class="card">
      <button onclick="openLink('https://mangabuff.ru/clubs/dark-moon')">🔥 Мой клуб</button>
      <button onclick="openLink('https://mangabuff.ru/clubs/dark-moon/boost')">📈 Внести вклад / Вклады</button>
      <button onclick="openLink('https://mangabuff.ru/manga/test')">🃏 Клубные карты</button>
      <button onclick="openLink('https://mangabuff.ru/clubs')">🏆 Рейтинг клубов</button>
    </div>
    <div class="card">
      <button onclick="openLink('https://mangabuff.ru/')">📚 Новые главы</button>
      <button onclick="openLink('https://mangabuff.ru/manga')">📖 Каталог манги</button>
      <button onclick="openLink('https://t.me/mangabuff')">📰 Новости сайта (TG)</button>
    </div>
    <button onclick="openLink('https://mangabuff.ru/faq/general')" style="background:rgba(30,10,50,0.9);border-color:#7B4A9C;color:#ddd;">📋 FAQ по клубам и вкладам</button>
  </div>

  <!-- ИГРА (бой) -->
  <div id="game-screen" class="screen">
    <h2 style="text-align:center;color:#C084FC;margin:0 0 20px;">⚔️ БОЙ КАРТОЧЕК</h2>
    <div class="battle-container">
      <div class="pokemon-row">
        <div class="pokemon">
          <div style="font-size:32px;">🧛</div>
          <strong id="player-name">DARK LORD</strong><br>
          <span style="color:#bb99ff;">Lv.12 • Лето • Трава</span>
          <div class="hp-bar"><div class="hp-fill" id="player-hp" style="width:85%"></div></div>
          <small>HP <span id="player-hp-text">170/200</span></small>
        </div>
        <div class="pokemon">
          <div style="font-size:32px;">🐉</div>
          <strong id="enemy-name">SHADOW DRAGON</strong><br>
          <span style="color:#bb99ff;">Lv.11 • Осень • Дракон</span>
          <div class="hp-bar"><div class="hp-fill" id="enemy-hp" style="width:46%"></div></div>
          <small>HP <span id="enemy-hp-text">92/200</span></small>
        </div>
      </div>

      <div class="log" id="battle-log">Что будет делать Dark Lord?</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <button onclick="chooseAction('attack')">⚔️ Атаковать</button>
        <button onclick="chooseAction('bag')">🎒 Рюкзак</button>
        <button onclick="chooseAction('switch')">🃏 Выбор героя</button>
        <button onclick="chooseAction('run')">🏃 Сбежать</button>
      </div>

      <div id="moves-panel" style="display:none;margin-top:15px;">
        <div class="moves-list">
          <button class="move-btn" onclick="useMove('Удар тенью')">Удар тенью</button>
          <button class="move-btn" onclick="useMove('Ядовитый шип')">Ядовитый шип</button>
          <button class="move-btn" onclick="useMove('Лунный луч')">Лунный луч</button>
          <button class="move-btn" onclick="useMove('Тёмный вихрь')">Тёмный вихрь</button>
        </div>
      </div>
    </div>
  </div>

  <!-- КАРТОЧКИ / LUNadex -->
  <div id="inventory-screen" class="screen">
    <h2 style="text-align:center;color:#C084FC;margin-bottom:20px;">🃏 Lunadex</h2>
    <div class="inventory-grid">
      <button onclick="showInventorySection('pokedex')">📖 Lunadex (нумерация героев)</button>
      <button onclick="showInventorySection('items')">🎒 Предметы</button>
      <button onclick="showInventorySection('myheroes')">👤 Мои герои</button>
      <button onclick="showInventorySection('myitems')">📦 Мои предметы</button>
    </div>

    <div id="inventory-content" style="margin-top:20px;"></div>
  </div>

</div>

<!-- Нижняя панель -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab(0)"><span>🔥</span>Клуб</div>
  <div class="nav-item" onclick="switchTab(1)"><span>⚔️</span>Игра</div>
  <div class="nav-item" onclick="switchTab(2)"><span>🃏</span>Lunadex</div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  function openLink(url) {
    tg.openLink(url);
  }

  // Переключение вкладок
  function switchTab(n) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.screen')[n].classList.add('active');
    document.querySelectorAll('.nav-item')[n].classList.add('active');
  }

  // БОЙ
  function chooseAction(action) {
    const log = document.getElementById('battle-log');
    const movesPanel = document.getElementById('moves-panel');

    movesPanel.style.display = 'none';

    if (action === 'attack') {
      movesPanel.style.display = 'block';
      log.innerHTML = 'Выбери атаку:';
    } else if (action === 'bag') {
      log.innerHTML = 'Рюкзак пока пуст...';
    } else if (action === 'switch') {
      log.innerHTML = 'Выбор героя (1 из 6)<br>Скоро будет полный список';
    } else if (action === 'run') {
      const chance = Math.random() * 100;
      log.innerHTML = chance > 35 ? '✅ Ты успешно сбежал!' : '❌ Побег не удался!';
    }
  }

  function useMove(moveName) {
    const log = document.getElementById('battle-log');
    log.innerHTML = `Ты использовал <strong>${moveName}</strong>!<br>Урон врагу: 48`;
    document.getElementById('moves-panel').style.display = 'none';
  }

  // LUNadex
  const heroes = [
    { id:1, name:"Dark Lord", season:"Лето", element:"Трава", hp:200, atk:85, def:70, spAtk:95, spDef:80, speed:90 },
    { id:2, name:"Shadow Dragon", season:"Осень", element:"Дракон", hp:220, atk:110, def:65, spAtk:120, spDef:75, speed:95 }
  ];

  function showInventorySection(section) {
    const content = document.getElementById('inventory-content');
    content.innerHTML = '';

    if (section === 'pokedex') {
      content.innerHTML = `
        <h3>Lunadex #001 — #002</h3>
        <p>Энциклопедия героев клуба Dark Moon.<br>
        Каждый герой привязан к своему сезону и стихии.</p>`;
    } 
    else if (section === 'myheroes') {
      let html = '<h3>Мои герои</h3>';
      heroes.forEach(h => {
        html += `
          <div class="card" style="padding:15px;">
            <strong>#${h.id} ${h.name}</strong><br>
            <small>${h.season} • ${h.element}</small><br>
            <div class="stat"><span>HP</span><span>${h.hp}</span></div>
            <div class="stat"><span>Атака</span><span>${h.atk}</span></div>
            <div class="stat"><span>Защита</span><span>${h.def}</span></div>
            <div class="stat"><span>Спец.атака</span><span>${h.spAtk}</span></div>
            <div class="stat"><span>Спец.защита</span><span>${h.spDef}</span></div>
            <div class="stat"><span>Скорость</span><span>${h.speed}</span></div>
          </div>`;
      });
      content.innerHTML = html;
    } 
    else {
      content.innerHTML = `<h3>${section === 'items' ? 'Все предметы' : 'Мои предметы'}</h3>
        <p>Здесь будут предметы для ловли, усиления и украшения героев.</p>`;
    }
  }

  // Запуск
  window.onload = () => switchTab(0);
</script>
</body>
</html>
